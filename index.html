<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Path</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="header">
  <span id="logo">The Path</span>
  <div class="header-btns">
    <button class="icon-btn" id="lang-btn" title="Switch language" aria-label="Switch language" onclick="_setLang(document.documentElement.lang === 'ar' ? 'en' : 'ar')">AR</button>
    <button class="icon-btn hidden" id="share-btn" title="Copy shareable link" aria-label="Copy shareable link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
    <button class="icon-btn" id="dark-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</div>

<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="main">
  <!-- LANDING -->
  <div id="landing">
    <p class="eyebrow">A journey of reason</p>
    <h1>The Path</h1>
    <p class="tagline"></p>
    <p class="topics-label"></p>
    <ul class="topics-list" id="topics-list"></ul>
    <p class="fine-print"></p>
    <button class="start-btn" id="start-btn">Begin the journey</button>
  </div>

  <!-- JOURNEY -->
  <div id="journey">
    <button class="back-btn hidden" id="back-btn" aria-label="Go back">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span class="back-label">Back</span>
    </button>
    <div id="node-content" class="anim"></div>
  </div>
</div>

<script type="module" src="js/app.js?v=2"></script>
</body>
</html>
